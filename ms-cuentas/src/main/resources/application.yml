server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: ms-cuentas
  datasource:
    url: jdbc:postgresql://localhost:5432/bancodb
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123

rabbitmq:
  exchange: banco.exchange
  queue:
    clientes: clientes.queue
  routing-key:
    cliente-creado: cliente.creado
    cliente-eliminado: cliente.eliminado
